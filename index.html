<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Clone Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --wa-teal: #128c7e; --wa-green: #25d366; --chat-bg: #e5ddd5; }
        
        /* Mencegah Scroll Seluruh Body & Zoom */
        html, body { 
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
            width: 100%; height: 100%; position: fixed;
            background-color: #fff;
        }

        .whatsapp-teal { background-color: var(--wa-teal); }
        .chat-wallpaper { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-color: var(--chat-bg); 
            background-size: contain;
        }

        /* FAB - Tetap di Atas */
        .fab { 
            position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; 
            background-color: var(--wa-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; shadow: 0 4px 12px rgba(0,0,0,0.3); z-index: 100; 
            cursor: pointer;
        }

        .hidden { display: none !important; }
        
        /* Independent Scroll untuk Chat dan Kontak */
        .scrollable-area { 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            touch-action: pan-y; 
        }

        .bubble-out { 
            background-color: #dcf8c6; border-radius: 8px 0 8px 8px; 
            align-self: flex-end; box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
            max-width: 85%; padding: 8px 12px; position: relative;
        }

        /* Fix Layout untuk Mobile Keyboard */
        #screen-chat { height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="screen-country" class="h-full w-full flex flex-col items-center justify-center p-8">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-20 mb-10">
        <h1 class="text-2xl font-bold mb-8">Selamat Datang</h1>
        <select id="country-select" class="w-full max-w-xs p-3 border-b-2 border-green-600 outline-none mb-10 text-center font-bold">
            <option value="+62">Indonesia (+62)</option>
            <option value="+1">USA (+1)</option>
        </select>
        <button onclick="generateNumber()" class="bg-green-600 text-white w-full max-w-xs py-3 rounded-full font-bold shadow-md active:bg-green-700">MULAI</button>
    </div>

    <div id="screen-numbers" class="hidden h-full w-full flex flex-col p-6">
        <h2 class="text-xl font-bold text-teal-800 mb-2">Pilih Nomor Anda</h2>
        <p class="text-xs text-gray-500 mb-6 italic">Klik tombol salin pada nomor 13 digit</p>
        <div id="number-list" class="flex-1 scrollable-area space-y-4 mb-6"></div>
        <div class="space-y-4">
            <input id="input-number" type="tel" placeholder="Tempel nomor di sini..." class="w-full p-4 border-2 rounded-xl outline-none focus:border-green-500 text-center font-bold">
            <button onclick="goToHome()" class="w-full whatsapp-teal text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg">MASUK</button>
        </div>
    </div>

    <div id="screen-home" class="hidden h-full w-full flex flex-col">
        <header class="whatsapp-teal text-white p-4 shadow-md">
            <div class="flex justify-between items-center mb-6">
                <span class="text-2xl font-bold">WhatsApp</span>
                <div class="flex gap-5 text-xl"><span>🔍</span><span>⋮</span></div>
            </div>
            <div class="flex justify-around text-xs font-bold uppercase tracking-widest">
                <div class="border-b-4 border-white pb-2 w-1/3 text-center">Chat</div>
                <div class="opacity-60 w-1/3 text-center">Status</div>
                <div class="opacity-60 w-1/3 text-center">Calls</div>
            </div>
        </header>
        
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-10 text-center">
            <div class="text-6xl mb-4">💬</div>
            <p>Daftar chat kosong.<br>Klik tombol + untuk menambah kontak.</p>
        </div>

        <div id="contact-list" class="flex-1 scrollable-area"></div>

        <div onclick="addNewContact()" class="fab">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M19,13h-6v6h-2v-6H5v-2h6V5h2v6h6V13z"/></svg>
        </div>
    </div>

    <div id="screen-chat" class="hidden h-full w-full flex flex-col">
        <header class="whatsapp-teal p-3 text-white flex items-center gap-3">
            <button onclick="showScreen('screen-home')" class="text-2xl font-bold">←</button>
            <div id="target-pfp" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-lg">?</div>
            <div class="flex-1">
                <h3 id="target-name" class="font-bold text-sm leading-tight">Nama</h3>
                <p class="text-[10px] opacity-80">Online</p>
            </div>
            <div class="flex gap-5">📞 ⋮</div>
        </header>
        
        <div id="chat-messages" class="flex-1 chat-wallpaper p-4 scrollable-area flex flex-col gap-3"></div>
        
        <footer class="p-2 bg-[#f0f0f0] flex items-center gap-2">
            <div class="flex-1 bg-white rounded-full flex items-center px-4 py-1">
                <input id="msg-input" type="text" placeholder="Ketik pesan" class="w-full py-2 outline-none text-sm" style="user-select: text;">
            </div>
            <button onclick="sendMsg()" class="whatsapp-teal text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="white" style="transform: rotate(45deg); margin-left: 4px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <script>
        // --- SECURITY & LOCK ZOOM ---
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('wheel', e => { if(e.ctrlKey) e.preventDefault(); }, { passive: false });

        // --- CORE FUNCTIONS ---
        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // 1. Generate Nomor 13 Digit Sesuai Indo
        function generateNumber() {
            const code = document.getElementById('country-select').value;
            const container = document.getElementById('number-list');
            container.innerHTML = "";
            
            for(let i=0; i<5; i++) {
                let numStr = "";
                if(code === "+62") {
                    // +62 + 8 + 10 digit acak = 13 digit (Simbol + tidak dihitung)
                    let rand = "";
                    for(let j=0; j<10; j++) rand += Math.floor(Math.random() * 10);
                    numStr = code + "8" + rand;
                } else {
                    let rand = "";
                    for(let j=0; j<12; j++) rand += Math.floor(Math.random() * 10);
                    numStr = code + rand;
                }
                
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border-l-8 border-teal-600 shadow-sm">
                        <span class="font-bold text-gray-800">${numStr}</span>
                        <button onclick="copyToIn('${numStr}')" class="bg-teal-600 text-white px-4 py-1 rounded-full text-xs font-bold">SALIN</button>
                    </div>`;
            }
            showScreen('screen-numbers');
        }

        function copyToIn(n) {
            document.getElementById('input-number').value = n;
        }

        function goToHome() {
            const val = document.getElementById('input-number').value;
            if(val.length < 13) return alert("Nomor tidak valid (Minimal 13 Digit)!");
            showScreen('screen-home');
        }

        // 2. Tambah Kontak (Data masuk ke Home Menu)
        function addNewContact() {
            const name = prompt("Nama Kontak:");
            const phone = prompt("Nomor (+628...):");
            if(name && phone) {
                document.getElementById('empty-state').classList.add('hidden');
                const list = document.getElementById('contact-list');
                const div = document.createElement('div');
                div.className = "flex items-center p-4 border-b border-gray-100 active:bg-gray-50 cursor-pointer";
                div.onclick = () => openChat(name);
                div.innerHTML = `
                    <div class="w-14 h-14 bg-teal-500 rounded-full mr-4 flex items-center justify-center text-white font-bold text-xl uppercase">${name[0]}</div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-1">
                            <h4 class="font-bold text-gray-800 text-lg">${name}</h4>
                            <span class="text-[10px] text-gray-400">12:00</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate font-mono">${phone}</p>
                    </div>`;
                list.appendChild(div);
            }
        }

        // 3. Chat Room Logic
        function openChat(name) {
            document.getElementById('target-name').innerText = name;
            document.getElementById('target-pfp').innerText = name[0];
            document.getElementById('chat-messages').innerHTML = "";
            showScreen('screen-chat');
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            const box = document.getElementById('chat-messages');
            if(!inp.value) return;
            
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            box.innerHTML += `
                <div class="bubble-out shadow-sm">
                    <p class="text-[15px] text-gray-800">${inp.value}</p>
                    <span class="text-[9px] text-gray-500 block text-right mt-1 font-bold">${time} ✓✓</span>
                </div>`;
            
            inp.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
