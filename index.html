<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Clone v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
        .whatsapp-green { background-color: #075e54; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; font-size: 24px; }
        .hidden { display: none; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); height: 100vh; }
    </style>
</head>
<body>

    <div id="screen-country" class="p-6 flex flex-col items-center justify-center h-screen text-center">
        <h2 class="text-2xl font-bold mb-6 text-teal-800">Selamat Datang</h2>
        <p class="mb-4 text-gray-600">Pilih kode negara untuk memulai:</p>
        <select id="country-select" class="w-full p-3 border rounded-lg mb-4">
            <option value="+62">🇮🇩 Indonesia (+62)</option>
            <option value="+1">🇺🇸 USA (+1)</option>
            <option value="+44">🇬🇧 UK (+44)</option>
            <option value="+81">🇯🇵 Japan (+81)</option>
            <option value="+61">🇦🇺 Australia (+61)</option>
        </select>
        <button onclick="generateNumbers()" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold">Lanjut</button>
    </div>

    <div id="screen-numbers" class="hidden p-6 h-screen">
        <h2 class="text-xl font-bold mb-4">Pilih & Salin Nomor Kamu:</h2>
        <div id="number-list" class="space-y-3 mb-6"></div>
        <div class="border-t pt-4">
            <p class="text-sm text-gray-500 mb-2">Tempel nomor yang sudah disalin di sini:</p>
            <input id="input-number" type="text" placeholder="Masukkan nomor..." class="w-full p-3 border rounded-lg mb-4">
            <button onclick="goToHome()" class="w-full whatsapp-green text-white py-3 rounded-lg font-bold">Masuk ke WhatsApp</button>
        </div>
    </div>

    <div id="screen-home" class="hidden h-screen flex flex-col">
        <header class="whatsapp-green p-4 text-white flex justify-between items-center shadow-lg">
            <span class="font-bold text-xl">WhatsApp</span>
            <div class="flex gap-4">🔍 ⋮</div>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center text-gray-400 p-10 text-center">
            <div class="bg-gray-100 rounded-full p-6 mb-4">💬</div>
            <p>Belum ada chat. Klik tombol di pojok bawah untuk menambah kontak.</p>
        </div>
        <div onclick="openAddContact()" class="fab">+</div>
    </div>

    <div id="screen-chat" class="hidden h-screen flex flex-col">
        <header class="whatsapp-green p-3 text-white flex items-center gap-3">
            <button onclick="backToHome()">⬅</button>
            <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
            <div id="chat-title" class="font-bold">Nama Kontak</div>
        </header>
        <div id="chat-content" class="flex-1 chat-bg p-4 overflow-y-auto"></div>
        <footer class="p-2 bg-gray-200 flex gap-2">
            <input id="msg-input" type="text" class="flex-1 p-2 rounded-full outline-none" placeholder="Ketik pesan">
            <button onclick="sendMsg()" class="whatsapp-green text-white px-4 py-2 rounded-full">➤</button>
        </footer>
    </div>

    <script>
        let myNumber = "";

        // Fungsi generate 5 nomor acak
        function generateNumbers() {
            const code = document.getElementById('country-select').value;
            const listDiv = document.getElementById('number-list');
            listDiv.innerHTML = "";
            
            for(let i=0; i<5; i++) {
                let rand = Math.floor(Math.random() * 90000000) + 10000000;
                let fullNum = code + rand;
                listDiv.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-gray-100 rounded-lg border">
                        <span class="font-mono">${fullNum}</span>
                        <button onclick="copyNum('${fullNum}')" class="text-blue-600 text-sm font-bold">Salin</button>
                    </div>
                `;
            }
            showScreen('screen-numbers');
        }

        function copyNum(num) {
            navigator.clipboard.writeText(num);
            alert("Nomor disalin: " + num);
        }

        function goToHome() {
            const val = document.getElementById('input-number').value;
            if(val.length < 5) return alert("Masukkan nomor dengan benar!");
            myNumber = val;
            showScreen('screen-home');
        }

        function openAddContact() {
            let name = prompt("Masukkan Nama Kontak:");
            let num = prompt("Masukkan Nomor HP:");
            if(name && num) {
                // Langsung buka chat dengan kontak baru
                document.getElementById('chat-title').innerText = name;
                showScreen('screen-chat');
            }
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            const chatBox = document.getElementById('chat-content');
            chatBox.innerHTML += `<div class="bg-[#dcf8c6] p-2 self-end ml-auto max-w-[80%] rounded-lg mb-2 shadow-sm text-sm">${inp.value}</div>`;
            inp.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function backToHome() { showScreen('screen-home'); }

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
