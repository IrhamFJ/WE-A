<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WA Clone Pro v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --wa-teal: #128c7e; --wa-green: #25d366; --chat-bg: #e5ddd5; }
        html, body { 
            touch-action: none; user-select: none; -webkit-user-select: none;
            overflow: hidden; width: 100%; height: 100%; position: fixed; background-color: #fff;
        }
        .whatsapp-teal { background-color: var(--wa-teal); }
        .chat-wallpaper { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-color: var(--chat-bg); background-size: contain;
        }
        .fab { 
            position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; 
            background-color: var(--wa-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; shadow: 0 4px 12px rgba(0,0,0,0.3); z-index: 100; cursor: pointer;
        }
        .hidden { display: none !important; }
        .scrollable-area { overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
        .bubble-out { 
            background-color: #dcf8c6; border-radius: 8px 0 8px 8px; 
            align-self: flex-end; box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
            max-width: 85%; padding: 8px 12px; position: relative;
        }
        /* Modal Style untuk Tambah Kontak */
        #modal-overlay { background: rgba(0,0,0,0.5); z-index: 200; }
    </style>
</head>
<body>

    <div id="screen-country" class="h-full w-full flex flex-col items-center justify-center p-8">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-20 mb-10">
        <h1 class="text-2xl font-bold mb-8">Selamat Datang</h1>
        <select id="country-select" class="w-full max-w-xs p-3 border-b-2 border-green-600 outline-none mb-10 text-center font-bold">
            <option value="+62">Indonesia (+62)</option>
        </select>
        <button onclick="generateNumber()" class="bg-green-600 text-white w-full max-w-xs py-3 rounded-full font-bold shadow-md">MULAI</button>
    </div>

    <div id="screen-numbers" class="hidden h-full w-full flex flex-col p-6">
        <h2 class="text-xl font-bold text-teal-800 mb-2 text-center">Nomor Tersedia</h2>
        <div id="number-list" class="flex-1 scrollable-area space-y-4 mb-6 pt-4"></div>
        <div class="space-y-4">
            <input id="input-number" type="tel" placeholder="Tempel nomor hasil salin" class="w-full p-4 border-2 rounded-xl outline-none text-center font-bold tracking-tighter">
            <button onclick="goToHome()" class="w-full whatsapp-teal text-white py-4 rounded-xl font-bold uppercase tracking-widest">MASUK</button>
        </div>
    </div>

    <div id="screen-home" class="hidden h-full w-full flex flex-col">
        <header class="whatsapp-teal text-white p-4 shadow-md">
            <div class="flex justify-between items-center mb-6">
                <span class="text-2xl font-bold">WhatsApp</span>
                <div class="flex gap-5 text-xl"><span>🔍</span><span>⋮</span></div>
            </div>
            <div class="flex justify-around text-xs font-bold uppercase tracking-widest">
                <div class="border-b-4 border-white pb-2 w-1/3 text-center">Chat</div>
                <div class="opacity-60 w-1/3 text-center">Status</div>
                <div class="opacity-60 w-1/3 text-center">Calls</div>
            </div>
        </header>
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-10 text-center">
            <div class="text-6xl mb-4">💬</div>
            <p>Klik tombol + untuk tambah kontak</p>
        </div>
        <div id="contact-list" class="flex-1 scrollable-area"></div>
        <div onclick="openAddModal()" class="fab"><span class="text-3xl">+</span></div>
    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Tambah Kontak Baru</h3>
            <input id="new-contact-name" type="text" placeholder="Nama Kontak" class="w-full p-3 border rounded-lg mb-4 outline-none focus:border-green-500">
            <div class="flex items-center border rounded-lg mb-6 p-3 bg-gray-50">
                <span class="font-bold text-gray-600 mr-1">+62</span>
                <input id="new-contact-phone" type="tel" maxlength="11" placeholder="81234567xxx" class="w-full bg-transparent outline-none font-bold tracking-widest">
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="text-gray-500 font-bold px-4 py-2">BATAL</button>
                <button onclick="saveContact()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="hidden h-full w-full flex flex-col">
        <header class="whatsapp-teal p-3 text-white flex items-center gap-3">
            <button onclick="showScreen('screen-home')" class="text-2xl font-bold">←</button>
            <div id="target-pfp" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-lg uppercase">?</div>
            <div class="flex-1 truncate">
                <h3 id="target-name" class="font-bold text-sm leading-tight">Nama</h3>
                <p class="text-[10px] opacity-80">Online</p>
            </div>
            <div class="flex gap-5">📞 ⋮</div>
        </header>
        <div id="chat-messages" class="flex-1 chat-wallpaper p-4 scrollable-area flex flex-col gap-3"></div>
        <footer class="p-2 bg-[#f0f0f0] flex items-center gap-2">
            <div class="flex-1 bg-white rounded-full flex items-center px-4 py-1 shadow-sm">
                <input id="msg-input" type="text" placeholder="Ketik pesan" class="w-full py-2 outline-none text-sm" style="user-select: text;">
            </div>
            <button onclick="sendMsg()" class="whatsapp-teal text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md">➤</button>
        </footer>
    </div>

    <script>
        // Disable Zoom
        document.addEventListener('gesturestart', e => e.preventDefault());

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Logic Nomor 13 Digit (Start Screen)
        function generateNumber() {
            const container = document.getElementById('number-list');
            container.innerHTML = "";
            for(let i=0; i<5; i++) {
                let rand = "";
                for(let j=0; j<10; j++) rand += Math.floor(Math.random() * 10);
                let numStr = "+628" + rand;
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border-l-8 border-teal-600 shadow-sm">
                        <span class="font-bold text-gray-800">${numStr}</span>
                        <button onclick="copyToIn('${numStr}')" class="bg-teal-600 text-white px-4 py-1 rounded-full text-xs font-bold">SALIN</button>
                    </div>`;
            }
            showScreen('screen-numbers');
        }

        function copyToIn(n) { document.getElementById('input-number').value = n; }

        function goToHome() {
            if(document.getElementById('input-number').value.length < 13) return alert("Pilih nomor 13 digit!");
            showScreen('screen-home');
        }

        // MODAL LOGIC
        function openAddModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('new-contact-phone').value = "";
            document.getElementById('new-contact-name').value = "";
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        function saveContact() {
            const name = document.getElementById('new-contact-name').value;
            const phoneSuffix = document.getElementById('new-contact-phone').value;
            
            if(name && phoneSuffix.length >= 10) {
                const fullPhone = "+62" + phoneSuffix;
                document.getElementById('empty-state').classList.add('hidden');
                const list = document.getElementById('contact-list');
                const div = document.createElement('div');
                div.className = "flex items-center p-4 border-b border-gray-100 active:bg-gray-50 cursor-pointer";
                div.onclick = () => openChat(name);
                div.innerHTML = `
                    <div class="w-14 h-14 bg-teal-500 rounded-full mr-4 flex items-center justify-center text-white font-bold text-xl uppercase">${name[0]}</div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-1">
                            <h4 class="font-bold text-gray-800 text-lg">${name}</h4>
                            <span class="text-[10px] text-gray-400">Baru</span>
                        </div>
                        <p class="text-sm text-gray-500 font-mono">${fullPhone}</p>
                    </div>`;
                list.appendChild(div);
                closeModal();
            } else {
                alert("Lengkapi Nama & Nomor (Min 10-11 digit lagi)!");
            }
        }

        function openChat(name) {
            document.getElementById('target-name').innerText = name;
            document.getElementById('target-pfp').innerText = name[0];
            document.getElementById('chat-messages').innerHTML = "";
            showScreen('screen-chat');
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            const box = document.getElementById('chat-messages');
            if(!inp.value) return;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            box.innerHTML += `<div class="bubble-out shadow-sm"><p class="text-[15px] text-gray-800">${inp.value}</p><span class="text-[9px] text-gray-500 block text-right mt-1 font-bold">${time} ✓✓</span></div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
