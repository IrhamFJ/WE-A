<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #dadbd3; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .whatsapp-green { background-color: #075e54; }
        .whatsapp-light-green { background-color: #25d366; }
        .bubble-in { background-color: #ffffff; border-radius: 0 8px 8px 8px; }
        .bubble-out { background-color: #dcf8c6; border-radius: 8px 0 8px 8px; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="whatsapp-green text-white p-3 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gray-300 rounded-full overflow-hidden">
                <img src="https://i.pravatar.cc/100" alt="Profile">
            </div>
            <div>
                <h1 id="contact-number" class="font-bold leading-tight">Memuat nomor...</h1>
                <p class="text-xs opacity-80">Online</p>
            </div>
        </div>
        <div class="flex gap-4 opacity-80">
            <span>📞</span><span>📎</span><span>⋮</span>
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 chat-bg flex flex-col gap-2">
        <div class="bubble-in p-2 self-start max-w-[80%] shadow-sm text-sm">
            Halo! Ini adalah simulasi WhatsApp. Coba ketik pesan di bawah.
            <span class="block text-[10px] text-gray-500 text-right">09:00</span>
        </div>
    </main>

    <footer class="bg-[#f0f0f0] p-2 flex items-center gap-2">
        <button class="text-gray-500 text-xl px-2">😊</button>
        <input id="message-input" type="text" placeholder="Ketik pesan" class="flex-1 p-2 rounded-full focus:outline-none">
        <button id="send-btn" class="whatsapp-green text-white w-10 h-10 rounded-full flex items-center justify-center">
            ➤
        </button>
    </footer>

    <script>
        // Generator Nomor Otomatis (Kode Negara)
        const countryCodes = ["+62", "+1", "+44", "+91", "+81"];
        const randomCode = countryCodes[Math.floor(Math.random() * countryCodes.length)];
        const randomNumber = Math.floor(Math.random() * 900000000) + 100000000;
        document.getElementById('contact-number').innerText = `${randomCode} ${randomNumber}`;

        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function sendMessage() {
            const text = input.value.trim();
            if (text !== "") {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

                // Bubble Pesan Keluar
                const bubble = document.createElement('div');
                bubble.className = "bubble-out p-2 self-end max-w-[80%] shadow-sm text-sm";
                bubble.innerHTML = `${text} <span class="block text-[10px] text-gray-500 text-right">${time} ✓✓</span>`;
                
                chatBox.appendChild(bubble);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;

                // Simulasi Balasan Bot (Opsional)
                setTimeout(() => {
                    const reply = document.createElement('div');
                    reply.className = "bubble-in p-2 self-start max-w-[80%] shadow-sm text-sm";
                    reply.innerHTML = `Pesan diterima! <span class="block text-[10px] text-gray-500 text-right">${time}</span>`;
                    chatBox.appendChild(reply);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 1000);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
